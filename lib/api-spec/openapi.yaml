openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: weigh-stations
    description: Weigh station live status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /weigh-stations/status:
    get:
      operationId: listWeighStationStatuses
      tags: [weigh-stations]
      summary: List reported weigh station statuses
      description: Returns all driver-reported weigh station open/closed statuses
      responses:
        "200":
          description: List of weigh station statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeighStationStatus"
  /weigh-stations/status/{osmId}:
    put:
      operationId: setWeighStationStatus
      tags: [weigh-stations]
      summary: Report a weigh station's live status
      description: Upserts the driver-reported open/closed status for a weigh station
      parameters:
        - name: osmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeighStationStatusInput"
      responses:
        "200":
          description: Updated weigh station status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeighStationStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WeighStationStatus:
      type: object
      properties:
        osmId:
          type: string
        status:
          type: string
          enum: [open, closed]
        updatedAt:
          type: string
          format: date-time
      required:
        - osmId
        - status
        - updatedAt
    WeighStationStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [open, closed]
      required:
        - status

